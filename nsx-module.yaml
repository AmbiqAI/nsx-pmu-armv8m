schema_version: 1

module:
  name: nsx-pmu-armv8m
  type: runtime
  version: "0.1.0"

support:
  ambiqsuite: true
  zephyr: false

summary: Armv8-M PMU helpers for hardware counter configuration, capture, and transport.

capabilities:
  - pmu
  - profiling
  - hardware_counters
  - armv8m

use_cases:
  - function profiling
  - layer profiling
  - model-level PMU measurement
  - MVE or Helium counter capture

agent_keywords:
  - pmu
  - counters
  - cycles
  - armv8-m
  - mve

build:
  cmake:
    package: nsx_pmu_armv8m
    targets:
      - nsx::pmu_armv8m

depends:
  required:
    - nsx-core
    - nsx-soc-hal
  optional:
    - nsx-harness

compatibility:
  boards:
    - "*"
  socs:
    - apollo5b
    - apollo510
    - apollo510b
    - apollo330P
  toolchains:
    - arm-none-eabi-gcc
    - armclang
